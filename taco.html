<head>
<title>Taco Bot by ImprobableScience</title>

<!-- ffd42a -->
<style>
#tacobutton {
  background-image: linear-gradient(92.88deg, #dab832 9.16%, #a6673d 64.89%, #75a60a 91.72%);
  border-radius: 8px;
  border-style: none;
  box-sizing: border-box;
  color: #FFFFFF;
  cursor: pointer;
  flex-shrink: 0;
  font-family: "Inter UI","SF Pro Display",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Oxygen,Ubuntu,Cantarell,"Open Sans","Helvetica Neue",sans-serif;
  font-size: 20px;
  font-weight: 500;
  height: 4rem;
  padding: 0 1.6rem;
  text-align: center;
  text-shadow: rgba(0, 0, 0, 0.25) 0 3px 8px;
  transition: all .5s;
  user-select: none;
  align: center;
  -webkit-user-select: none;
  touch-action: manipulation;
}

#tacobutton:hover {
  box-shadow: rgba(255, 212, 42, 0.5) 0 1px 30px;
  transition-duration: .1s;
}

@media (min-width: 768px) {
  #tacobutton {
    padding: 0 1.6rem;
  }
}

#tacoport {
	background-image: linear-gradient(70deg, #ffd42a 9%, #00aaff 80%);
   padding: 5rem;
   margin: 5rem;
   font-size: 40px;
}
</style>
</head>
<body>
<script>
	function taconator() {
		var meat = [
			"Beef", "Chicken", "Carne Asada", "Chorizo", "Lengua"
   	];
      meatchoice = meat[Math.floor(Math.random() * meat.length)];


   	var toppings = [
			"green chile", "red chile", "salsa", "onion", "tomato", "cilantro",
         "shredded cheese", "the tears of your blorbos", "lettuce", "tomatillos",
         "pickled onion", "radish", "sour cream", "queso", "guacamole", "spicy mayo",
			"roasted veggies", "pico de gallo", "shredded cabbage", "bell peppers"
   	];
      // max toppings is 3, min is 1
		numtoppings = Math.floor(Math.random() * 3) + 1;
      selected_toppings = [];
      for (let i = 0; i < numtoppings; i++) {
			selected_toppings.push(toppings[Math.floor(Math.random() * toppings.length)]);
      }
      topping_string = selected_toppings.join(", ");
      last_comma = topping_string.lastIndexOf(",")
      if (last_comma > -1) {
			topping_string = topping_string.substring(0, last_comma) + " and" + topping_string.substring(last_comma+1, topping_string.length);
		}

		tacoport = document.getElementById("tacoport")
      tacoport.style.visibility = "visible";

      tacoport.innerHTML = "How about a " + meatchoice + " taco with " + topping_string + " on top?";
   }
</script>


<div style="text-align: center; margin-top: 1em">
<button type="button" id="tacobutton" onclick="taconator()">Press for taco</button>
</div>

<div id="tacoport" style="visibility: hidden">
&nbsp;
</div>

<p>Want to draw your taco?  Send it to me on <a href="https://www.tumblr.com/improbablescience">Tumblr</a> and I might make it show up here sometimes for funsies.  No AI please, but ugly hand drawn crayon tacos are always acceptable.</p>
</body>
</html>
